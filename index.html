<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Aura Weather</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <!-- NAVBAR -->

      <nav>
        <h1>Aura Weather</h1>

        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search for a city..."
          />

          <button id="searchBtn">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
      </nav>

      <!-- MAIN WEATHER SECTION -->

      <main>
        <section class="weather-card">
          <div class="top-section">
            <div>
              <p class="location" id="location">Chennai, India</p>
              <h2 class="temperature" id="temperature">29°C</h2>
              <p class="condition" id="condition">Sunny</p>
            </div>

            <div>
              <img id="weatherIcon" src="" alt="weather-icon" />
            </div>
          </div>

          <div class="weather-details">
            <div class="detail-card">
              <i class="fa-solid fa-droplet"></i>
              <p>Humidity</p>
              <h3 id="humidity">40%</h3>
            </div>

            <div class="detail-card">
              <i class="fa-solid fa-wind"></i>
              <p>Wind Speed</p>
              <h3 id="wind">12 km/h</h3>
            </div>

            <div class="detail-card">
              <i class="fa-solid fa-temperature-half"></i>
              <p>Feels Like</p>
              <h3 id="feelsLike">32°C</h3>
            </div>
          </div>
        </section>

        <!-- FORECAST SECTION -->

        <section class="forecast-section">
          <h2>3-Day Forecast</h2>

          <div class="forecast-container" id="forecastContainer"></div>
        </section>
      </main>
    </div>

    <script src="index.js"></script>
  </body>
</html>
